<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LesPlaces2Paris - Dashboard Demandes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0f1117;color:#e1e1e1;min-height:100vh}

        /* HEADER */
        .header{background:linear-gradient(135deg,#1a1d2e,#252a3a);padding:20px 30px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
        .header-left{display:flex;align-items:center;gap:15px}
        .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#f39c12,#e67e22);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#fff}
        .header h1{font-size:1.3rem;font-weight:700;color:#fff}
        .header h1 span{color:#f39c12;font-weight:800}
        .header-right{display:flex;align-items:center;gap:15px}
        .stat-badge{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:8px 16px;border-radius:10px;font-size:.8rem;display:flex;align-items:center;gap:8px}
        .stat-badge .num{font-weight:700;color:#f39c12;font-size:1.1rem}
        .btn-add{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;border:none;padding:10px 20px;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px}
        .btn-add:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(243,156,18,.3)}

        /* FILTERS */
        .filters{padding:20px 30px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;border-bottom:1px solid rgba(255,255,255,.04)}
        .filter-label{font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3);margin-right:5px}
        .filter-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#aaa;padding:8px 18px;border-radius:8px;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
        .filter-btn:hover{background:rgba(255,255,255,.1);color:#fff}
        .filter-btn.active{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff;border-color:transparent;font-weight:600}
        .filter-btn .count{background:rgba(0,0,0,.2);padding:2px 8px;border-radius:20px;margin-left:6px;font-size:.7rem}
        .search-box{margin-left:auto;position:relative}
        .search-box input{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#fff;padding:9px 15px 9px 38px;border-radius:8px;font-size:.85rem;width:250px;font-family:'Inter',sans-serif;transition:border-color .3s}
        .search-box input:focus{outline:none;border-color:rgba(243,156,18,.4)}
        .search-box input::placeholder{color:rgba(255,255,255,.25)}
        .search-box::before{content:'';position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-radius:50%}

        /* STATUS FILTERS */
        .status-bar{padding:15px 30px;display:flex;gap:20px;border-bottom:1px solid rgba(255,255,255,.04)}
        .status-tab{font-size:.8rem;color:rgba(255,255,255,.4);cursor:pointer;padding:5px 0;border-bottom:2px solid transparent;transition:all .2s}
        .status-tab:hover{color:rgba(255,255,255,.7)}
        .status-tab.active{color:#f39c12;border-bottom-color:#f39c12;font-weight:600}

        /* TABLE */
        .table-container{padding:0 30px 30px}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        thead th{text-align:left;padding:14px 16px;font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.3);border-bottom:1px solid rgba(255,255,255,.06);font-weight:600;cursor:pointer;transition:color .2s;white-space:nowrap}
        thead th:hover{color:rgba(255,255,255,.6)}
        thead th.sorted{color:#f39c12}
        tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .2s;cursor:pointer}
        tbody tr:hover{background:rgba(255,255,255,.03)}
        tbody td{padding:14px 16px;font-size:.85rem;white-space:nowrap}

        /* Client */
        .client-cell{display:flex;align-items:center;gap:10px}
        .client-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0}
        .client-name{font-weight:500;color:#fff}
        .client-ig{font-size:.75rem;color:rgba(255,255,255,.3)}

        /* Artiste tag */
        .artist-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;font-size:.8rem;font-weight:600}
        .artist-jul{background:rgba(231,76,60,.15);color:#e74c3c}
        .artist-sch{background:rgba(155,89,182,.15);color:#9b59b6}
        .artist-ninho{background:rgba(46,204,113,.15);color:#2ecc71}
        .artist-pnl{background:rgba(52,152,219,.15);color:#3498db}
        .artist-booba{background:rgba(241,196,15,.15);color:#f1c40f}
        .artist-damso{background:rgba(230,126,34,.15);color:#e67e22}
        .artist-orelsan{background:rgba(26,188,156,.15);color:#1abc9c}
        .artist-other{background:rgba(255,255,255,.08);color:#aaa}

        /* Places / Cat */
        .places-badge{background:rgba(255,255,255,.06);padding:4px 12px;border-radius:20px;font-weight:600;font-size:.85rem}
        .cat-badge{padding:4px 10px;border-radius:6px;font-weight:600;font-size:.8rem}
        .cat-1{background:rgba(241,196,15,.15);color:#f1c40f}
        .cat-2{background:rgba(52,152,219,.15);color:#3498db}
        .cat-3{background:rgba(46,204,113,.15);color:#2ecc71}
        .cat-fosse{background:rgba(231,76,60,.15);color:#e74c3c}
        .cat-vip{background:rgba(155,89,182,.15);color:#9b59b6}

        /* Status */
        .status{display:inline-flex;align-items:center;gap:5px;font-size:.8rem;font-weight:500}
        .status-dot{width:7px;height:7px;border-radius:50%}
        .status-new .status-dot{background:#f39c12}
        .status-new{color:#f39c12}
        .status-pending .status-dot{background:#3498db}
        .status-pending{color:#3498db}
        .status-done .status-dot{background:#2ecc71}
        .status-done{color:#2ecc71}
        .status-cancelled .status-dot{background:#e74c3c}
        .status-cancelled{color:#e74c3c}

        /* Source */
        .source-badge{font-size:.75rem;padding:3px 8px;border-radius:4px;font-weight:500}
        .source-ig{background:rgba(193,53,132,.15);color:#c13584}
        .source-tg{background:rgba(0,136,204,.15);color:#0088cc}

        /* Date */
        .date-event{font-weight:600;color:#fff}
        .date-msg{font-size:.75rem;color:rgba(255,255,255,.3)}

        /* Actions */
        .action-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#aaa;width:32px;height:32px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;font-size:.9rem;margin-right:4px}
        .action-btn:hover{background:rgba(46,204,113,.15);color:#2ecc71;border-color:rgba(46,204,113,.3)}
        .action-btn.delete:hover{background:rgba(231,76,60,.15);color:#e74c3c;border-color:rgba(231,76,60,.3)}

        /* Empty state */
        .empty-state{text-align:center;padding:80px 20px;color:rgba(255,255,255,.3)}
        .empty-state .icon{font-size:3rem;margin-bottom:15px}
        .empty-state p{font-size:.9rem}

        /* MODAL */
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
        .modal-overlay.active{display:flex}
        .modal{background:#1a1d2e;border-radius:16px;padding:30px;width:500px;max-width:90vw;border:1px solid rgba(255,255,255,.08);box-shadow:0 25px 60px rgba(0,0,0,.4)}
        .modal h2{font-size:1.2rem;margin-bottom:20px;color:#fff}
        .modal-row{display:flex;gap:12px;margin-bottom:14px}
        .modal-field{flex:1}
        .modal-field label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.3);margin-bottom:6px}
        .modal-field input,.modal-field select{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;padding:10px 12px;border-radius:8px;font-size:.85rem;font-family:'Inter',sans-serif}
        .modal-field input:focus,.modal-field select:focus{outline:none;border-color:rgba(243,156,18,.4)}
        .modal-field select{cursor:pointer}
        .modal-field select option{background:#1a1d2e;color:#fff}
        .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
        .btn-cancel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#aaa;padding:10px 20px;border-radius:10px;font-size:.85rem;cursor:pointer;font-family:'Inter',sans-serif}
        .btn-save{background:linear-gradient(135deg,#f39c12,#e67e22);border:none;color:#fff;padding:10px 25px;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}

        /* Responsive */
        @media(max-width:768px){
            .header{padding:15px;flex-wrap:wrap;gap:10px}
            .filters{padding:15px;overflow-x:auto}
            .search-box{margin-left:0;width:100%}
            .search-box input{width:100%}
            .table-container{padding:0 10px 20px;overflow-x:auto}
            .stat-badge{display:none}
            .status-bar{padding:10px 15px;overflow-x:auto}
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="header-left">
            <div class="logo">LP</div>
            <h1>Les<span>Places</span>2Paris</h1>
        </div>
        <div class="header-right">
            <div class="stat-badge">Demandes <span class="num" id="totalCount">0</span></div>
            <div class="stat-badge">En attente <span class="num" id="pendingCount" style="color:#3498db">0</span></div>
            <button class="btn-sync" onclick="syncTelegram()" id="syncBtn" style="background:rgba(0,136,204,.15);border:1px solid rgba(0,136,204,.3);color:#0088cc;padding:10px 20px;border-radius:10px;font-weight:600;font-size:.85rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif">&#9889; Sync Telegram</button>
            <button class="btn-add" onclick="openModal()">+ Nouvelle demande</button>
        </div>
    </header>

    <!-- FILTERS ARTISTES -->
    <div class="filters">
        <span class="filter-label">Artiste</span>
        <button class="filter-btn active" onclick="filterArtist('all',this)">Tous</button>
        <div id="artistFilters"></div>
        <div class="search-box">
            <input type="text" placeholder="Rechercher un client..." oninput="searchClient(this.value)">
        </div>
    </div>

    <!-- STATUS TABS -->
    <div class="status-bar">
        <div class="status-tab active" onclick="filterStatus('all',this)">Toutes</div>
        <div class="status-tab" onclick="filterStatus('new',this)">Nouvelles</div>
        <div class="status-tab" onclick="filterStatus('pending',this)">En cours</div>
        <div class="status-tab" onclick="filterStatus('done',this)">Traitees</div>
        <div class="status-tab" onclick="filterStatus('cancelled',this)">Annulees</div>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th onclick="sortTable('client')">Client</th>
                    <th onclick="sortTable('artist')">Artiste</th>
                    <th onclick="sortTable('dateEvent')">Date Evenement</th>
                    <th>Places</th>
                    <th>Categorie</th>
                    <th>Source</th>
                    <th onclick="sortTable('dateMsg')">Date Message</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
        <div class="empty-state" id="emptyState">
            <div class="icon">&#128229;</div>
            <p>Aucune demande pour le moment.<br>Ajoute des demandes avec le bouton + en haut.</p>
        </div>
    </div>

    <!-- MODAL AJOUT -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h2 id="modalTitle">Nouvelle demande</h2>
            <div class="modal-row">
                <div class="modal-field">
                    <label>Client (Instagram / Telegram)</label>
                    <input type="text" id="inputClient" placeholder="@nom_client">
                </div>
                <div class="modal-field">
                    <label>Source</label>
                    <select id="inputSource">
                        <option value="instagram">Instagram</option>
                        <option value="telegram">Telegram</option>
                    </select>
                </div>
            </div>
            <div class="modal-row">
                <div class="modal-field">
                    <label>Artiste</label>
                    <input type="text" id="inputArtist" placeholder="JUL, SCH, Ninho...">
                </div>
                <div class="modal-field">
                    <label>Date Evenement</label>
                    <input type="text" id="inputDateEvent" placeholder="16 Mai 2026">
                </div>
            </div>
            <div class="modal-row">
                <div class="modal-field">
                    <label>Nombre de places</label>
                    <input type="number" id="inputPlaces" placeholder="2" min="1">
                </div>
                <div class="modal-field">
                    <label>Categorie</label>
                    <select id="inputCat">
                        <option value="CAT 1">CAT 1</option>
                        <option value="CAT 2">CAT 2</option>
                        <option value="CAT 3">CAT 3</option>
                        <option value="FOSSE">FOSSE</option>
                        <option value="VIP">VIP</option>
                        <option value="NC">Non precise</option>
                    </select>
                </div>
            </div>
            <div class="modal-row">
                <div class="modal-field">
                    <label>Date du message</label>
                    <input type="date" id="inputDateMsg">
                </div>
                <div class="modal-field">
                    <label>Statut</label>
                    <select id="inputStatus">
                        <option value="new">Nouvelle</option>
                        <option value="pending">En cours</option>
                        <option value="done">Traitee</option>
                        <option value="cancelled">Annulee</option>
                    </select>
                </div>
            </div>
            <div class="modal-row">
                <div class="modal-field" style="flex:1">
                    <label>Notes</label>
                    <input type="text" id="inputNotes" placeholder="Details supplementaires...">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Annuler</button>
                <button class="btn-save" onclick="saveDemand()">Enregistrer</button>
            </div>
        </div>
    </div>

    <script>
        const initialDemands = [
            {client:"Moussavi Albane (@albane.mss)",artist:"JUL",dateEvent:"16 Mai 2026",places:"2",cat:"FOSSE",source:"instagram",dateMsg:"2025-04-01",status:"new",notes:"Stade de France Jul fosse (ou pas)"},
            {client:"Karim (@karimflb)",artist:"JUL",dateEvent:"",places:"4+",cat:"NC",source:"instagram",dateMsg:"2025-04-02",status:"new",notes:"jul"},
            {client:"Sanchez Melanie (@melaniecataleya)",artist:"JUL",dateEvent:"",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-02",status:"new",notes:"Jul"},
            {client:"Eve Elbaz (@eveelbazz)",artist:"JUL",dateEvent:"16 Mai 2026",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-03",status:"new",notes:"jul stade de france 16 mai 2026"},
            {client:"Ghe Aida (@aidaghe)",artist:"JUL",dateEvent:"",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-05",status:"new",notes:"Concert JUL"},
            {client:"Le Mentec Louis (@louislemtc)",artist:"JUL",dateEvent:"15 Mai",places:"1",cat:"FOSSE",source:"instagram",dateMsg:"2025-04-07",status:"new",notes:"Jul 15 mai stade de France en fosse"},
            {client:"Eve Elbaz (@eveelbazz)",artist:"AYA NAKAMURA",dateEvent:"30/31 Mai 2026",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-03",status:"new",notes:"aya stade de france 30/31 mai 2026"},
            {client:"Rouilly Victor (@Victorrly)",artist:"DAVID GUETTA",dateEvent:"12 Juin",places:"2",cat:"FOSSE",source:"tiktok",dateMsg:"2025-04-04",status:"new",notes:"David guetta/12 juin/fosse"},
            {client:"Dardoullier Noreen (@noreen.ddl)",artist:"BRUNO MARS",dateEvent:"",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-04",status:"new",notes:"bruno mars, n'importe quelle date, n'importe quelle categorie"},
            {client:"Stanislas Sirven Vienot (@stanssv)",artist:"CIRCOLOCO",dateEvent:"",places:"1",cat:"NC",source:"instagram",dateMsg:"2025-04-05",status:"new",notes:"Circoloco"},
            {client:"Laissar Chamoel (@Smail78)",artist:"BAD BUNNY",dateEvent:"Juillet (sam ou dim)",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-06",status:"new",notes:"Bad bunny juillet paris samedi ou dimanche"},
            {client:"June Drai (@Juneida1207)",artist:"TAME IMPALA",dateEvent:"3 Mai",places:"2",cat:"CAT 1",source:"instagram",dateMsg:"2025-04-06",status:"new",notes:"Tame Impala 3 Mai Paris Accor arena categorie 1"},
            {client:"Soriano Aure (@aure.srn)",artist:"BTS",dateEvent:"",places:"1",cat:"FOSSE",source:"instagram",dateMsg:"2025-04-07",status:"new",notes:"BTS en fosse SDF"},
            {client:"SALLAT Halima (@Haleema.st25)",artist:"BAD BUNNY",dateEvent:"",places:"1",cat:"NC",source:"instagram",dateMsg:"2025-04-08",status:"new",notes:"Bad bunny"},
            {client:"Scotti Emilie (@Emiliescotti92)",artist:"CELINE DION",dateEvent:"2026",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-08",status:"new",notes:"Celine Dion Paris 2026"},
            {client:"Wojciechowski Kimberly (@Wojciekokiki)",artist:"CELINE DION",dateEvent:"Septembre",places:"4",cat:"NC",source:"instagram",dateMsg:"2025-04-08",status:"new",notes:"Celine Dion / Paris / septembre / pas la fosse"},
            {client:"Henocq Simon (@Nomis.18)",artist:"CELINE DION",dateEvent:"",places:"4",cat:"NC",source:"instagram",dateMsg:"2025-04-09",status:"new",notes:"Psg, Rolland Garros, Celine Dion"},
            {client:"BRUN Isaure (@isaurebrn)",artist:"CELINE DION",dateEvent:"",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-09",status:"new",notes:"Celine Dion"},
            {client:"Karim Assaf (@karimflb)",artist:"BAD BUNNY",dateEvent:"",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-10",status:"new",notes:"Badbunny"},
            {client:"Henocq Simon (@Nomis.18)",artist:"CELINE DION",dateEvent:"",places:"4+",cat:"CAT 4",source:"instagram",dateMsg:"2025-04-10",status:"new",notes:"Concert Celine Dion categorie 4"},
            {client:"Choulet Ambre (@ambre272)",artist:"CELINE DION",dateEvent:"Sept/Oct",places:"2",cat:"PARTERRE DIAMANT / CAT 1",source:"instagram",dateMsg:"2025-04-10",status:"new",notes:"Celine Dion, sept/oct, Paris La Defense Arena, parterre diamant ou categorie 1"},
            {client:"Vidal Clothilde (@clothildevdl)",artist:"CELINE DION",dateEvent:"",places:"2",cat:"GRADIN CAT 4",source:"instagram",dateMsg:"2025-04-10",status:"new",notes:"Celine Dion / concert arena / gradin categorie 4"},
            {client:"Toulouse Paul (@paultls)",artist:"CELINE DION",dateEvent:"",places:"2",cat:"PARTERRE ASSIS CAT 1",source:"instagram",dateMsg:"2025-04-11",status:"new",notes:"Celine Dion parterre Assis categorie 1"},
            {client:"Louis dit Champain Jules (@julesldcp)",artist:"CELINE DION",dateEvent:"",places:"2",cat:"NC",source:"instagram",dateMsg:"2025-04-11",status:"new",notes:"Celine Dion"},
            {client:"Vidal Clothilde (@clothildevdl)",artist:"CELINE DION",dateEvent:"Toute date",places:"2",cat:"TOUTE CAT DISPO",source:"instagram",dateMsg:"2025-04-11",status:"new",notes:"Celine Dion / toute date / accor arena / toute categorie disponible"}
        ];
        // Load from localStorage or use initial data
        let demands = JSON.parse(localStorage.getItem('lp2p_demands') || 'null');
        if(!demands || demands.length === 0){
            demands = initialDemands;
            localStorage.setItem('lp2p_demands', JSON.stringify(demands));
        }
        let currentFilter = 'all';
        let currentStatus = 'all';
        let currentSearch = '';
        let editIndex = -1;

        const artistColors = {
            'JUL':'jul','SCH':'sch','NINHO':'ninho','PNL':'pnl',
            'BOOBA':'booba','DAMSO':'damso','ORELSAN':'orelsan'
        };

        function getArtistClass(artist){
            const upper = artist.toUpperCase();
            return artistColors[upper] ? 'artist-'+artistColors[upper] : 'artist-other';
        }

        function getCatClass(cat){
            if(cat.includes('1')) return 'cat-1';
            if(cat.includes('2')) return 'cat-2';
            if(cat.includes('3')) return 'cat-3';
            if(cat.toUpperCase().includes('FOSSE')) return 'cat-fosse';
            if(cat.toUpperCase().includes('VIP')) return 'cat-vip';
            return 'cat-2';
        }

        function getInitials(name){
            return name.replace('@','').substring(0,2).toUpperCase();
        }

        function renderTable(){
            const tbody = document.getElementById('tableBody');
            const empty = document.getElementById('emptyState');
            let filtered = demands.filter(d => {
                const matchArtist = currentFilter === 'all' || d.artist.toUpperCase() === currentFilter.toUpperCase();
                const matchStatus = currentStatus === 'all' || d.status === currentStatus;
                const matchSearch = currentSearch === '' || d.client.toLowerCase().includes(currentSearch.toLowerCase()) || d.artist.toLowerCase().includes(currentSearch.toLowerCase());
                return matchArtist && matchStatus && matchSearch;
            });

            if(filtered.length === 0){
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            tbody.innerHTML = filtered.map((d,i) => {
                const realIndex = demands.indexOf(d);
                const statusLabels = {new:'Nouvelle',pending:'En cours',done:'Traitee',cancelled:'Annulee'};
                return `<tr ondblclick="editDemand(${realIndex})">
                    <td><div class="client-cell"><div class="client-avatar">${getInitials(d.client)}</div><div><div class="client-name">${d.client}</div></div></div></td>
                    <td><span class="artist-tag ${getArtistClass(d.artist)}">${d.artist.toUpperCase()}</span></td>
                    <td><span class="date-event">${d.dateEvent}</span></td>
                    <td><span class="places-badge">${d.places}</span></td>
                    <td><span class="cat-badge ${getCatClass(d.cat)}">${d.cat}</span></td>
                    <td><span class="source-badge ${d.source==='instagram'?'source-ig':'source-tg'}">${d.source==='instagram'?'IG':'TG'}</span></td>
                    <td><span class="date-msg">${d.dateMsg}</span></td>
                    <td><span class="status status-${d.status}"><span class="status-dot"></span>${statusLabels[d.status]}</span></td>
                    <td>
                        <button class="action-btn" onclick="toggleStatus(${realIndex})" title="Changer statut">&#10003;</button>
                        <button class="action-btn delete" onclick="deleteDemand(${realIndex})" title="Supprimer">&#10005;</button>
                    </td>
                </tr>`;
            }).join('');

            // Update counts
            document.getElementById('totalCount').textContent = demands.length;
            document.getElementById('pendingCount').textContent = demands.filter(d=>d.status==='new'||d.status==='pending').length;

            // Update artist filters
            renderArtistFilters();
        }

        function renderArtistFilters(){
            const artists = {};
            demands.forEach(d => {
                const a = d.artist.toUpperCase();
                artists[a] = (artists[a]||0) + 1;
            });
            const container = document.getElementById('artistFilters');
            container.innerHTML = Object.entries(artists).sort((a,b)=>b[1]-a[1]).map(([name,count]) =>
                `<button class="filter-btn ${currentFilter.toUpperCase()===name?'active':''}" onclick="filterArtist('${name}',this)">${name}<span class="count">${count}</span></button>`
            ).join('');
        }

        function filterArtist(artist, el){
            currentFilter = artist;
            document.querySelectorAll('.filters .filter-btn').forEach(b=>b.classList.remove('active'));
            el.classList.add('active');
            renderTable();
        }

        function filterStatus(status, el){
            currentStatus = status;
            document.querySelectorAll('.status-tab').forEach(t=>t.classList.remove('active'));
            el.classList.add('active');
            renderTable();
        }

        function searchClient(val){
            currentSearch = val;
            renderTable();
        }

        function openModal(){
            editIndex = -1;
            document.getElementById('modalTitle').textContent = 'Nouvelle demande';
            document.getElementById('inputClient').value = '';
            document.getElementById('inputArtist').value = '';
            document.getElementById('inputDateEvent').value = '';
            document.getElementById('inputPlaces').value = '';
            document.getElementById('inputCat').value = 'CAT 1';
            document.getElementById('inputSource').value = 'instagram';
            document.getElementById('inputDateMsg').value = new Date().toISOString().split('T')[0];
            document.getElementById('inputStatus').value = 'new';
            document.getElementById('inputNotes').value = '';
            document.getElementById('modal').classList.add('active');
        }

        function editDemand(index){
            editIndex = index;
            const d = demands[index];
            document.getElementById('modalTitle').textContent = 'Modifier la demande';
            document.getElementById('inputClient').value = d.client;
            document.getElementById('inputArtist').value = d.artist;
            document.getElementById('inputDateEvent').value = d.dateEvent;
            document.getElementById('inputPlaces').value = d.places;
            document.getElementById('inputCat').value = d.cat;
            document.getElementById('inputSource').value = d.source;
            document.getElementById('inputDateMsg').value = d.dateMsg;
            document.getElementById('inputStatus').value = d.status;
            document.getElementById('inputNotes').value = d.notes || '';
            document.getElementById('modal').classList.add('active');
        }

        function closeModal(){
            document.getElementById('modal').classList.remove('active');
        }

        function saveDemand(){
            const d = {
                client: document.getElementById('inputClient').value,
                artist: document.getElementById('inputArtist').value,
                dateEvent: document.getElementById('inputDateEvent').value,
                places: document.getElementById('inputPlaces').value,
                cat: document.getElementById('inputCat').value,
                source: document.getElementById('inputSource').value,
                dateMsg: document.getElementById('inputDateMsg').value,
                status: document.getElementById('inputStatus').value,
                notes: document.getElementById('inputNotes').value
            };
            if(!d.client || !d.artist) return alert('Client et Artiste sont obligatoires');
            if(editIndex >= 0){
                demands[editIndex] = d;
            } else {
                demands.push(d);
            }
            localStorage.setItem('lp2p_demands', JSON.stringify(demands));
            closeModal();
            renderTable();
        }

        function toggleStatus(index){
            const order = ['new','pending','done','cancelled'];
            const current = order.indexOf(demands[index].status);
            demands[index].status = order[(current+1) % order.length];
            localStorage.setItem('lp2p_demands', JSON.stringify(demands));
            renderTable();
        }

        function deleteDemand(index){
            if(confirm('Supprimer cette demande ?')){
                demands.splice(index,1);
                localStorage.setItem('lp2p_demands', JSON.stringify(demands));
                renderTable();
            }
        }

        function sortTable(key){
            demands.sort((a,b) => {
                if(key==='client') return a.client.localeCompare(b.client);
                if(key==='artist') return a.artist.localeCompare(b.artist);
                if(key==='dateEvent') return a.dateEvent.localeCompare(b.dateEvent);
                if(key==='dateMsg') return a.dateMsg.localeCompare(b.dateMsg);
                return 0;
            });
            localStorage.setItem('lp2p_demands', JSON.stringify(demands));
            renderTable();
        }

        // TELEGRAM SYNC
        const TG_TOKEN = '8588915880:AAH0EYkEJcElZrqpt2843e8QC9xawLE7lBU';
        const TG_API = 'https://api.telegram.org/bot' + TG_TOKEN;
        let lastUpdateId = parseInt(localStorage.getItem('lp2p_lastUpdate') || '0');

        async function syncTelegram(){
            const btn = document.getElementById('syncBtn');
            btn.innerHTML = '&#8987; Syncing...';
            btn.style.opacity = '.6';
            try {
                const url = TG_API + '/getUpdates?offset=' + (lastUpdateId + 1) + '&limit=100';
                const res = await fetch(url);
                const data = await res.json();
                if(!data.ok || !data.result.length){
                    btn.innerHTML = '&#10003; A jour';
                    btn.style.color = '#2ecc71';
                    setTimeout(()=>{btn.innerHTML='&#9889; Sync Telegram';btn.style.color='#0088cc';btn.style.opacity='1'},2000);
                    return;
                }
                let newCount = 0;
                data.result.forEach(update => {
                    lastUpdateId = update.update_id;
                    const msg = update.message || update.channel_post;
                    if(!msg || !msg.text) return;
                    const parsed = parseMessage(msg.text, msg.date);
                    if(parsed){
                        // Check if already exists
                        const exists = demands.some(d => d.telegramId === update.update_id);
                        if(!exists){
                            parsed.telegramId = update.update_id;
                            demands.push(parsed);
                            newCount++;
                        }
                    }
                });
                localStorage.setItem('lp2p_lastUpdate', lastUpdateId.toString());
                localStorage.setItem('lp2p_demands', JSON.stringify(demands));
                renderTable();
                btn.innerHTML = '&#10003; +' + newCount + ' demandes';
                btn.style.color = '#2ecc71';
                setTimeout(()=>{btn.innerHTML='&#9889; Sync Telegram';btn.style.color='#0088cc';btn.style.opacity='1'},3000);
            } catch(err){
                btn.innerHTML = '&#10007; Erreur';
                btn.style.color = '#e74c3c';
                console.error(err);
                setTimeout(()=>{btn.innerHTML='&#9889; Sync Telegram';btn.style.color='#0088cc';btn.style.opacity='1'},3000);
            }
        }

        function parseMessage(text, timestamp){
            // Skip non-demand messages
            if(!text.includes('Nom') && !text.includes('nom')) return null;
            if(text.length < 20) return null;

            let d = {
                client: '',
                instagram: '',
                artist: '',
                dateEvent: '',
                places: '1',
                cat: 'NC',
                source: 'instagram',
                dateMsg: new Date(timestamp * 1000).toISOString().split('T')[0],
                status: 'new',
                notes: ''
            };

            // Extract Nom
            const nomMatch = text.match(/Nom\s*:\s*(.+)/i);
            if(nomMatch) d.client = nomMatch[1].trim();

            // Extract Instagram
            const igMatch = text.match(/Instagram\s*:\s*@?(\S+)/i);
            if(igMatch) d.instagram = '@' + igMatch[1].replace('@','').trim();
            if(d.instagram && !d.client) d.client = d.instagram;
            if(d.instagram) d.client = d.client + ' (' + d.instagram + ')';

            // Extract Evenement (contains artist + details)
            const eventMatch = text.match(/[EÉé]v[eéè]nement\s*:\s*(.+)/i);
            let eventText = '';
            if(eventMatch) eventText = eventMatch[1].trim();

            // Known artists
            const artists = ['JUL','SCH','NINHO','PNL','BOOBA','DAMSO','ORELSAN','NEKFEU','GAZO','ALONZO','SOPRANO','TAYC','DADJU','GIMS','NISKA','HAMZA','SDM','PLK','WERENOI','TIAKOLA','DINOS','ZIAK','FREEZE CORLEONE','RUSS','DRAKE','TRAVIS SCOTT','CENTRAL CEE','BURNA BOY','KAARIS','CELINE DION','CÉLINE DION','ED SHEERAN','COLDPLAY','THE WEEKND','BEYONCE','BEYONCÉ','RAMMSTEIN','METALLICA','INDOCHINE','STROMAE','KENDRICK LAMAR','EMINEM','STING','ROGER WATERS','DEPECHE MODE','MUSE','RED HOT','IMAGINE DRAGONS','DAFT PUNK','DAVID GUETTA','MARTIN GARRIX','ANGELE','ANGÈLE','VALD','HEUSS','LACRIM','MAES','RK','KOBA LAD','TIMAL','GAMBI','NAPS','SOOLKING'];
            const searchText = (eventText + ' ' + text).toUpperCase();

            for(const a of artists){
                if(searchText.includes(a)){
                    d.artist = a;
                    break;
                }
            }

            // If no known artist, use event text before "/" or first words
            if(!d.artist && eventText){
                const parts = eventText.split('/');
                d.artist = parts[0].trim().replace(/parterre|assis|debout|cat[ée]gorie\s*\d/gi,'').trim();
            }

            // Extract details from event text (category, location, date)
            if(eventText){
                d.notes = eventText;
                // Category detection
                if(/assis/i.test(eventText)) d.cat = 'ASSIS';
                if(/debout|fosse|parterre/i.test(eventText)) d.cat = 'FOSSE';
                if(/vip|carré or|carre or/i.test(eventText)) d.cat = 'VIP';
                if(/pelouse/i.test(eventText)) d.cat = 'PELOUSE';
                const catNum = eventText.match(/cat[ée]?g?o?r?i?e?\s*(\d)/i);
                if(catNum) d.cat = 'CAT ' + catNum[1];
                // Assis catégorie combo
                if(/assis\s*cat[ée]?g?o?r?i?e?\s*(\d)/i.test(eventText)){
                    const m = eventText.match(/assis\s*cat[ée]?g?o?r?i?e?\s*(\d)/i);
                    d.cat = 'ASSIS CAT ' + m[1];
                }
                if(/parterre\s*assis\s*cat[ée]?g?o?r?i?e?\s*(\d)/i.test(eventText)){
                    const m = eventText.match(/parterre\s*assis\s*cat[ée]?g?o?r?i?e?\s*(\d)/i);
                    d.cat = 'PARTERRE ASSIS CAT ' + m[1];
                }

                // Date in event
                const dateMatch = eventText.match(/(\d{1,2})\s*(janv|f[eé]v|mars|avr|mai|juin|juil|ao[uû]t|sept|oct|nov|d[eé]c)\w*\.?\s*(\d{4})?/i);
                if(dateMatch) d.dateEvent = dateMatch[0].trim();
                const dateMatch2 = eventText.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
                if(!d.dateEvent && dateMatch2) d.dateEvent = dateMatch2[0];
            }

            // Extract Places
            const placesMatch = text.match(/Places?\s*:\s*(\d+)/i);
            if(placesMatch) d.places = placesMatch[1];

            // Extract Source
            const sourceMatch = text.match(/Source\s*:\s*(.+)/i);
            if(sourceMatch){
                const src = sourceMatch[1].trim().toLowerCase();
                d.source = src.includes('instagram') ? 'instagram' : 'telegram';
            }

            if(!d.client || d.client.trim() === '') d.client = 'Inconnu';
            if(!d.artist || d.artist.trim() === '') d.artist = 'A DETERMINER';

            return d;
        }

        // Close modal on Escape
        document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal() });
        document.getElementById('modal').addEventListener('click', e => { if(e.target.id==='modal') closeModal() });

        // AUTO-SYNC every 30 seconds
        let autoSyncInterval = null;
        function startAutoSync(){
            syncTelegram();
            autoSyncInterval = setInterval(syncTelegram, 30000);
            document.getElementById('syncBtn').innerHTML = '&#9889; Auto-Sync ON';
            document.getElementById('syncBtn').style.background = 'rgba(46,204,113,.15)';
            document.getElementById('syncBtn').style.borderColor = 'rgba(46,204,113,.3)';
            document.getElementById('syncBtn').style.color = '#2ecc71';
        }
        // Start auto-sync on page load
        startAutoSync();

        // Init
        renderTable();
    </script>
</body>
</html>
